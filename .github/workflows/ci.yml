on: [push, pull_request]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-shear
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/checkout@v6
        with:
          repository: legalize-kr/legalize-pipeline
          path: legalize-pipeline
          # Pinned to a reviewed legalize-pipeline commit so this build is
          # reproducible: bumping requires re-running parity tests against the
          # new SHA in a follow-up PR. Do not move this back to a moving ref.
          ref: bda9ecff7c1d4bcbd7f076623dbe270493c64c07
          persist-credentials: false
      - run: python3 -m pip install -r legalize-pipeline/requirements.txt
      - run: >
          PYTHONPATH=legalize-pipeline python3 -m precedents.dump_oracle
          --cache-dir precedents/tests/fixtures/oracle-cache
          --output target/precedent-oracle.jsonl
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
        env:
          ORACLE_PATH: target/precedent-oracle.jsonl
          # Anchors the python_parity tests to the checkout above so they
          # fail loudly (not silently skip) if the pipeline checkout is ever
          # missing or relocated. Local dev still falls back to autodiscovery.
          LEGALIZE_PIPELINE_ROOT: ${{ github.workspace }}/legalize-pipeline
          PYTHON: python3
      - run: cargo clippy --workspace --no-deps -- -D warnings
      - run: cargo shear
      - run: cargo fmt --all -- --check
