name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "laws/README.md"
      - "laws/assets/README.md"
      - "precedents/README.md"
      - "precedents/assets/README.md"
      - "admrules/assets/README.md"
      - "ordinances/assets/README.md"

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: mlugg/setup-zig@v2
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,x86_64-apple-darwin,aarch64-apple-darwin
      - uses: taiki-e/install-action@cargo-zigbuild
      - uses: actions/checkout@v6
      - uses: Swatinem/rust-cache@v2
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bins=(
            legalize-kr-compiler
            precedent-kr-compiler
            admrule-kr-compiler
            ordinance-kr-compiler
          )
          manifests=(
            laws/Cargo.toml
            precedents/Cargo.toml
            admrules/Cargo.toml
            ordinances/Cargo.toml
          )
          targets=(
            aarch64-unknown-linux-musl
            x86_64-unknown-linux-musl
            universal2-apple-darwin
          )
          assets=()

          for manifest in "${manifests[@]}"; do
            for target in "${targets[@]}"; do
              cargo zigbuild --manifest-path "${manifest}" --no-default-features -r --target "${target}"
            done
          done

          for bin in "${bins[@]}"; do
            for target in "${targets[@]}"; do
              asset="${bin}-${target}"
              mv "target/${target}/release/${bin}" "${asset}"
              assets+=("${asset}")
            done
          done

          tar -cvf binaries.tar "${assets[@]}"

          VERSION="v$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')"
          TAG="${VERSION}-$(date -u +%Y%m%d%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes "${assets[@]}"
